version: '3.8'
# cell IP: 172.58.229.225
# public IP: 38.7.155.219
# LAN IP:  192.168.86.241 
services: 
    rabbitmq:
        image: bitnami/rabbitmq:latest
        container_name: rabbitmq
        restart: always
        networks:
        - backend-network
        ports:
        - 5672:5672
        - 15672:15672
        environment:
            RABBITMQ_USERNAME: palisaid
            RABBITMQ_PASSWORD: palisaid
            RABBITMQ_ERLANG_COOKIE: "SWQOKODSQALRPCLNMEQG"
            RABBITMQ_MANAGER_PORT_NUMBER: 15672
            RABBITMQ_NODE_PORT_NUMBER: 5672
            RABBITMQ_NODE_NAME: rabbit@rabbitmq
            RABBITMQ_USE_LONGNAME: "true"
            RABBITMQ_CLUSTER_NODE_TYPE: ram

