    pgadmin:
        container_name: pgadmin4_container
        image: dpage/pgadmin4
        restart: always
  #      depends_on:
  #      - postgres
        environment:
            PGADMIN_DEFAULT_EMAIL: pete.jenney@gmail.com
            PGADMIN_DEFAULT_PASSWORD: postgres
        ports:
        - "5050:80"
        networks:
        - backend-network

    GatewayController:
        container_name: palisaid-gatewayapi
        environment:
            - DOTNET_RUNNING_IN_DOCKER_CONTAINER=false
            - ASPNETCORE_ENVIRONMENT=Development 
        image: pjenney58/gatewayapi
        restart: always
        #depends_on: 
        #- rabbitmq
        ports: 
        - "5080:8080"
        - "5081:8081"
        build:
            context: .
            dockerfile: src/PrimaryControllers/Dockerfile
        networks:
        - backend-network

    CollectorController:
        container_name: palisaid-collectorapi
        environment:
            - DOTNET_RUNNING_IN_DOCKER_CONTAINER=true
            - ASPNETCORE_ENVIRONMENT=Development
        image: pjenney58/collectorapi
        restart: always
        depends_on:
        - rabbitmq
        ports: 
        - "5001:8080"
        build:
            context: .
            dockerfile: src/Collectors/CollectorsController/Dockerfile
        networks:
        - backend-network

    Fhir4Collector:
        container_name: palisaid-fhir4Collector
        environment:
            - DOTNET_RUNNING_IN_DOCKER_CONTAINER=true
            - ASPNETCORE_ENVIRONMENT=Development
        image: pjenney58/fhir4collector
        restart: always
        depends_on:
        - rabbitmq
        ports: 
        - "5002:8080"
        build:
            context: .
            dockerfile: src/Collectors/Fhir4Collector/Dockerfile
        networks:
        - backend-network

    reverseproxy:
        image: nginx
        container_name: palisaid-nginx
        volumes:
            - ./nginx/templates:/etc/nginx/templates
            - ./nginx/ssl/certs:/etc/ssl/certs/nginx

        ports:
            - "80:80"
            - "443:443" 

        restart: always
        
        build:
            context: .
            dockerfile: nginx/Dockerfile

        environment:
        - NGINX_HOST=registry.palisaid.com
        - NGINX_PORT=80
         
        networks:
        - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  data: