version: '3.5'

services:
  authentication:
    image: pjenney58/auth-api
    build:
      context: .
      dockerfile: src/Authentication/Dockerfile


  administration:
    image: pjenney58/admin-api
    build:
      context: .
      dockerfile: src/Administration/Dockerfile


  calendar:
    image: ${DOCKER_REGISTRY-}calendar-api
    build:
      context: .
      dockerfile: src/Calendar/Dockerfile


  codes:
    image: ${DOCKER_REGISTRY-}codes-api
    build:
      context: .
      dockerfile: src/Codes/Dockerfile


  collectors:
    image: ${DOCKER_REGISTRY-}collectors
    build:
      context: .
      dockerfile: src/Collectors/Dockerfile

  populationhealth:
    image: ${DOCKER_REGISTRY-}populationhealth
    build:
      context: .
      dockerfile: src/PopulationHealth/Dockerfile


  reports:
    image: ${DOCKER_REGISTRY-}reports
    build:
      context: .
      dockerfile: src/Reports/Dockerfile


  vectors:
    image: ${DOCKER_REGISTRY-}vectors
    build:
      context: .
      dockerfile: src/Vectors/Dockerfile

  collectorscontroller:
    image: ${DOCKER_REGISTRY-}collectorscontroller
    build:
      context: .
      dockerfile: src/Collectors/CollectorsController/Dockerfile


  hl7collector:
    image: ${DOCKER_REGISTRY-}hl7collector
    build:
      context: .
      dockerfile: src/Collectors/Hl7Collector/Dockerfile


  x12collector:
    image: ${DOCKER_REGISTRY-}x12collector
    build:
      context: .
      dockerfile: src/Collectors/X12Collector/Dockerfile

