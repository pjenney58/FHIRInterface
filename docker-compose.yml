    pgadmin:
        container_name: pgadmin4_container
        image: dpage/pgadmin4
        restart: always
  #      depends_on:
  #      - postgres
        environment:
            PGADMIN_DEFAULT_EMAIL: pete.jenney@gmail.com
            PGADMIN_DEFAULT_PASSWORD: postgres
        ports:
        - "5050:80"
        networks:
        - backend-network

    GatewayController:
        container_name: gatewayapi
        environment:
            - DOTNET_RUNNING_IN_DOCKER_CONTAINER=false
        image: pjenney58/gatewayapi
        restart: always
        ports: 
        - "5080:80"
        - "5081:443"
        build:
            context: .
            dockerfile: src/PrimaryControllers/Dockerfile
        networks:
        - backend-network

    CollectorController:
        container_name: collectorapi
        environment:
            - DOTNET_RUNNING_IN_DOCKER_CONTAINER=true
        image: pjenney58/collectorapi
        restart: always
        ports: 
        - "5001:80"
        build:
            context: .
            dockerfile: src/Collectors/CollectorsController/Dockerfile
        networks:
        - backend-network

    Fhir4Collector:
        container_name: fhir4Collector
        environment:
        - DOTNET_RUNNING_IN_DOCKER_CONTAINER=true
    
        image: pjenney58/fhir4collector
        restart: always
        ports: 
        - "5002:80"
        build:
            context: .
            dockerfile: src/Collectors/Fhir4Collector/Dockerfile
        networks:
        - backend-network


