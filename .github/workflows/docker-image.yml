name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: docker build . --file src/PrimaryController/Dockerfile --tag primary_consumer_api:$(date +%s)
      run: docker build . --file src/Authentication/Dockerfile --tag primary_authentication_api:$(date +%s)
      run: docker build . --file src/Administration/Dockerfile --tag primary_administration_api:$(date +%s)
