name: Build SysAdmin Front End

on: 
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Node.js
        uses: actions/setup-node@v1
        with:
          node-version: '20.5.1'
      - name: Install dependencies
        run: npm ci
        run: npm run build
        